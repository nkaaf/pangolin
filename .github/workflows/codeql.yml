name: "High Security CodeQL Analysis"

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  codeql-go:
    name: "CodeQL Go Scan"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Initialize CodeQL (Go)
        uses: github/codeql-action/init@v4.31.9
        with:
          languages: go
          queries: security-and-quality,security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.31.9

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.31.9

  codeql-actions:
    name: "CodeQL GitHub Actions Scan"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Initialize CodeQL (Actions)
        uses: github/codeql-action/init@v4.31.9
        with:
          languages: actions
          queries: security-and-quality,security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.31.9

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.31.9

  codeql-javascript-typescript:
    name: "CodeQL GitHub Javascript/Typescript Scan"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Initialize CodeQL (Javascript/Typescript)
        uses: github/codeql-action/init@v4.31.9
        with:
          languages: javascript-typescript
          queries: security-and-quality,security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.31.9

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.31.9